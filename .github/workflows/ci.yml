name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.4'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install CLI dependencies
        run: cd cli && dart pub get

      - name: Install shared core dependencies
        run: cd packages/overlay_core && dart pub get

      - name: Check formatting
        run: |
          dart format --output=none --set-exit-if-changed lib test
          dart format --output=none --set-exit-if-changed cli/lib cli/bin
          dart format --output=none --set-exit-if-changed packages/overlay_core/lib packages/overlay_core/test

      - name: Validate CLI release metadata
        run: |
          chmod +x tools/verify_cli_release_metadata.sh
          tools/verify_cli_release_metadata.sh

      - name: Analyze Flutter app
        run: flutter analyze

      - name: Analyze CLI
        run: cd cli && dart analyze

      - name: Analyze shared core
        run: cd packages/overlay_core && dart analyze

      - name: Test Flutter app
        run: flutter test

      - name: Test shared core
        run: cd packages/overlay_core && dart test

      - name: Smoke test CLI dry runs
        run: |
          tmpdir="$(mktemp -d)"
          touch "$tmpdir/clip.mp4"
          printf 'srt' >"$tmpdir/clip.srt"
          (cd cli && dart run bin/fpv_overlay.dart render --video "$tmpdir/clip.mp4" --srt "$tmpdir/clip.srt" --dry-run)
          (cd cli && dart run bin/fpv_overlay.dart batch --input-dir "$tmpdir" --dry-run)
